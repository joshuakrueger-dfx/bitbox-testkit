# Drop-in template — copy to .github/workflows/bitbox-audit.yml in any
# DFX repo (or any repo with BitBox02 integration). Runs the joshua-
# krueger-dfx/bitbox-testkit audit on every PR, posts a sticky comment
# with the coverage report, and uploads the raw JSON as an artifact.

name: bitbox-audit

on:
  pull_request:
    paths:
      - 'src/**'
      - 'app/**'
      - 'test/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'go/**'
      - '.github/workflows/bitbox-audit.yml'
  # Manual trigger lets maintainers re-run after a testkit release.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # required for the sticky PR comment

concurrency:
  group: bitbox-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: scan for known BitBox firmware quirks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: joshuakrueger-dfx/bitbox-testkit/.github/actions/bitbox-audit@v0.5.0
