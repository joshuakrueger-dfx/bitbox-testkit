# Drop-in template — copy to .github/workflows/bitbox-simulator.yml in any
# DFX repo with BitBox integration. Launches the official BitBox02
# simulator and runs the testkit baseline scenarios against real firmware
# logic. Linux runner required; the action skips cleanly on other hosts.

name: bitbox-simulator

on:
  pull_request:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'test/**'
      - 'modules/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pubspec.yaml'
      - '.github/workflows/bitbox-simulator.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bitbox-simulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: BitBox02 simulator check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: joshuakrueger-dfx/bitbox-testkit/.github/actions/bitbox-simulator@v0.5.0
