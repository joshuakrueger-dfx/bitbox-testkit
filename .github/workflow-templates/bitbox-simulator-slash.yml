# Drop-in template — copy to .github/workflows/bitbox-simulator-slash.yml
# in any DFX repo. Comment "/bitbox-simulator" on a PR to launch the
# official BitBox02 simulator and run the testkit baseline scenarios
# against real firmware logic.
#
# Recognised variants:
#   /bitbox-simulator                 — defaults
#   /bitbox-simulator ref=main        — use bleeding-edge testkit scenarios

name: bitbox-simulator (slash)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: bitbox-simulator-slash-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  guard:
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/bitbox-simulator')
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.authz.outputs.authorized }}
      sha: ${{ steps.parse.outputs.sha }}
      testkit-ref: ${{ steps.parse.outputs.testkit_ref }}
      firmware: ${{ steps.parse.outputs.firmware }}
      fail-on-findings: ${{ steps.parse.outputs.fail_on_findings }}
    steps:
      - name: Authorization
        id: authz
        uses: actions/github-script@v7
        env:
          ASSOC: ${{ github.event.comment.author_association }}
          ACTOR: ${{ github.event.comment.user.login }}
        with:
          script: |
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const ok = allowed.includes(process.env.ASSOC);
            core.setOutput('authorized', ok ? 'true' : 'false');
            if (!ok) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: `:no_entry_sign: \`@${process.env.ACTOR}\` is not authorized to run \`/bitbox-simulator\`.`,
              });
            }

      - name: Parse command + resolve PR head
        id: parse
        if: steps.authz.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || '').trim();
            const args = body.replace(/^\/bitbox-simulator\s*/, '').split(/\s+/).filter(Boolean);
            let testkitRef = 'v0.5.0';
            let firmware = '';
            let failOnFindings = 'true';
            for (const tok of args) {
              if (tok === 'fail') { failOnFindings = 'true'; continue; }
              const [k, v] = tok.split('=');
              if (k === 'ref' && v) testkitRef = v;
              if (k === 'firmware' && v) firmware = v;
            }
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('testkit_ref', testkitRef);
            core.setOutput('firmware', firmware);
            core.setOutput('fail_on_findings', failOnFindings);
            await github.rest.reactions.createForIssueComment({
              ...context.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

  simulator:
    needs: guard
    if: needs.guard.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.sha }}
      - uses: joshuakrueger-dfx/bitbox-testkit/.github/actions/bitbox-simulator@v0.5.0
        with:
          testkit-ref: ${{ needs.guard.outputs.testkit-ref }}
          firmware: ${{ needs.guard.outputs.firmware }}
          fail-on-findings: ${{ needs.guard.outputs.fail-on-findings }}
