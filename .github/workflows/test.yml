name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quirks-sync:
    name: quirks.json sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/sync-quirks.sh --check

  go-unit:
    name: Go unit tests (no simulator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go/go.sum
      - run: go vet ./...
      - run: go test -race -timeout 60s ./...

  go-simulator:
    name: Go simulator integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go/go.sum
      - name: cache simulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/bitbox-testkit-simulators
          key: bitbox-simulators-${{ hashFiles('go/bitbox/simulator/embedded.go') }}
          restore-keys: |
            bitbox-simulators-
      - name: install stdbuf
        run: which stdbuf || sudo apt-get install -y coreutils
      - name: run simulator-tagged tests
        env:
          WALLET_TESTKIT_SIMCACHE: ${{ github.workspace }}/.simcache
        run: |
          mkdir -p "$WALLET_TESTKIT_SIMCACHE"
          go test -tags simulator -timeout 5m ./bitbox/simulator/...

  go-simulator-matrix:
    # Runs the full baseline against EVERY embedded firmware version
    # (v9.19.0 → v9.26.1). Catches regressions where a new scenario
    # works against the newest firmware but breaks against an older
    # one a real user may still be running — important because the
    # BitBox02 only auto-updates when the user opens the BitBoxApp,
    # so production has a long tail of older firmwares in the wild.
    name: simulator matrix · ${{ matrix.firmware }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    strategy:
      fail-fast: false
      matrix:
        firmware:
          - bitbox02-multi-v9.26.1-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.25.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.24.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.23.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.22.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.21.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.20.0-simulator1.0.0-linux-amd64
          - bitbox02-multi-v9.19.0-simulator1.0.0-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go/go.sum
      - name: cache simulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/bitbox-testkit-simulators
          key: bitbox-simulators-${{ hashFiles('go/bitbox/simulator/embedded.go') }}
          restore-keys: |
            bitbox-simulators-
      - name: run scenarios against ${{ matrix.firmware }}
        env:
          WALLET_TESTKIT_SIMCACHE: ${{ github.workspace }}/.simcache
        run: |
          mkdir -p "$WALLET_TESTKIT_SIMCACHE"
          go run -tags simulator ./cmd/bitbox-simulator-check \
            --firmware "${{ matrix.firmware }}" \
            --cache "$WALLET_TESTKIT_SIMCACHE" \
            --format markdown

  ts-unit:
    name: TypeScript unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test

  action-yaml-lint:
    name: composite action YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse every workflow + action YAML
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          paths = sorted(set(
            glob.glob('.github/**/*.yml', recursive=True) +
            glob.glob('.github/**/*.yaml', recursive=True)
          ))
          bad = []
          for p in paths:
            try:
              yaml.safe_load(open(p))
              print(f'ok  {p}')
            except Exception as e:
              bad.append((p, e))
              print(f'BAD {p}: {e}')
          if bad:
            sys.exit(1)
          PY

  action-selftest:
    name: composite action self-test (no consumer)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: run composite action against this repo
        uses: ./.github/actions/bitbox-audit
        with:
          testkit-ref: ${{ github.sha }}
          run-jest: 'false'
          comment-on-pr: 'false'
          wasm-hash-check: 'false'
          # The testkit repo has no `src/` to scan; the audit should
          # still exit cleanly (no findings, exit 0).
          fail-on-findings: 'true'
